# Token -> device-name table (per-device), all-in-one image.
# Included by nginx in the http context (conf.d/*.conf). Empty $otel_device -> ingest vhost returns 401.
# DO NOT edit by hand — use `ccobs add-device` / `ccobs revoke-device`.
# Long tokens -> bump the map hash bucket size.
map_hash_bucket_size 128;
map $http_authorization $otel_device {
    default "";
    # "Bearer tok_example_xxxxxxxx"  "example-machine";
}
