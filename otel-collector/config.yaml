# OTel Collector â€” receives OTLP from Claude Code (via nginx), exports metricsâ†’Prometheus, logsâ†’Loki.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 10s

exporters:
  # Metrics: expose /metrics for Prometheus to scrape. Keep resource attrs (machine, user...) as labels.
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true
  # Logs: forward to Loki via native OTLP (/otlp/v1/logs).
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  # Debug: log to stdout (check docker logs to verify data is arriving).
  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
