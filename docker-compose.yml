# Observability stack — monitor Claude Code usage (OTel → Prometheus/Loki → Grafana).
#
# Everything is published on LOCALHOST; the (existing) HOST nginx proxies two subdomains:
#   <OTEL_DOMAIN>      → 127.0.0.1:4318  (OTLP HTTP, token-guarded)
#   <GRAFANA_DOMAIN> → 127.0.0.1:3000 (Grafana, login-guarded)
#
# Start:  sudo docker compose up -d
name: claude-code-observability

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4318:4318"   # OTLP HTTP — nginx <OTEL_DOMAIN> proxies in here
    networks: [obs]
    depends_on: [loki]
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "127.0.0.1:9090:9090"   # internal/debug only; NOT exposed to the internet
    networks: [obs]
    security_opt:
      - no-new-privileges:true

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - lokidata:/loki
    networks: [obs]
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://<GRAFANA_DOMAIN>"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"   # nginx <GRAFANA_DOMAIN> proxies in here
    networks: [obs]
    depends_on: [prometheus, loki]
    security_opt:
      - no-new-privileges:true

volumes:
  promdata:
  lokidata:
  grafanadata:

networks:
  obs:
    driver: bridge
