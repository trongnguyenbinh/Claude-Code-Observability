# INGEST vhost — <OTEL_DOMAIN> → OTLP HTTP collector (127.0.0.1:4318). Guarded by per-device tokens.
# Deploy: /etc/nginx/conf.d/otel.conf  (requires a cert first: certbot certonly --webroot -d <OTEL_DOMAIN>)
server {
    server_name <OTEL_DOMAIN>;
    listen 80;
    listen [::]:80;
    location ^~ /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    server_name <OTEL_DOMAIN>;
    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate /etc/letsencrypt/live/claude-code-observability/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/claude-code-observability/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 16m;

    # Only accept the OTLP/HTTP path /v1/* and require a valid token (map $otel_device).
    location /v1/ {
        if ($otel_device = "") { return 401; }
        proxy_pass http://127.0.0.1:4318;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Otel-Device $otel_device;
    }

    location / { return 404; }
}
