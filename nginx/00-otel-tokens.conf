# Token → device-name table (per-device). Deploy to /etc/nginx/conf.d/00-otel-tokens.conf
# This map lives in the http context (conf.d is included inside http{}). An empty $otel_device → the otel vhost returns 401.
# DO NOT edit by hand — use scripts/add-device.sh and revoke-device.sh.
# Long tokens → the map hash bucket size needs to be increased.
map_hash_bucket_size 128;
map $http_authorization $otel_device {
    default "";
    # "Bearer tok_example_xxxxxxxx"  "example-machine";
}
