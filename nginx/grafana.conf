# DASHBOARD vhost — <GRAFANA_DOMAIN> → Grafana (127.0.0.1:3000). Guarded by Grafana login.
# Deploy: /etc/nginx/conf.d/grafana.conf  (requires a cert: certbot certonly --webroot -d <GRAFANA_DOMAIN>)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    server_name <GRAFANA_DOMAIN>;
    listen 80;
    listen [::]:80;
    location ^~ /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    server_name <GRAFANA_DOMAIN>;
    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate /etc/letsencrypt/live/claude-code-observability/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/claude-code-observability/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # (Optional) tighten further: allow only the office IP. Uncomment to enable.
    # allow <OFFICE_IP>;
    # deny all;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
